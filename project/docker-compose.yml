services:
  mysql:
    image: mysql:8.4
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    environment:
      MYSQL_DATABASE: liepin_recruit
      MYSQL_ROOT_PASSWORD: 123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p123"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  backend:
    build:
      context: ./django_recruit
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "change-me-in-prod"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      DB_NAME: liepin_recruit
      DB_USER: root
      DB_PASSWORD: 123
      DB_HOST: mysql
      DB_PORT: "3306"
      REDIS_URL: redis://redis:6379/0
      JOB_LIST_CACHE_TTL_SECONDS: "30"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./spiderMain:/spiderMain:ro

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
  redis_data:

